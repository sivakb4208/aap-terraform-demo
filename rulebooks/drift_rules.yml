# EDA rulebook — triggers drift detection automaticall-Always running in EDA
---
- name: Drift Detection Rulebook
  hosts: all
  sources:
    - ansible.eda.range:
        limit: 100
        delay: 60
  rules:
    - name: Trigger drift detection workflow
      condition: event.i >= 0
      action:
        run_workflow_template:
          name: "Drift-Detection-Workflow"
          organization: Default
