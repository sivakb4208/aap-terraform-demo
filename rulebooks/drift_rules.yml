# EDA rulebook — triggers drift detection automaticall-Always running in EDA
---
- name: Drift Detection Rulebook
  hosts: all
  sources:
    - ansible.eda.range:
        limit: 100
        delay: 60
  rules:
    - name: Trigger drift detection
      condition: event.i >= 0
      action:
        run_job_template:
          name: "2-Detect Drift"
          organization: Default

    - name: Trigger remediation on drift detected
      condition: event.job.status == "failed" and event.job.name == "2-Detect Drift"
      action:
        run_job_template:
          name: "3-Remediate Drift"
          organization: Default

    - name: Trigger verification after remediation
      condition: event.job.status == "successful" and event.job.name == "3-Remediate Drift"
      action:
        run_job_template:
          name: "4-Verify Compliance"
          organization: Default
